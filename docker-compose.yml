services:
  roco-push-console:
    build: .
    image: ${DOCKER_IMAGE:-linxi5013/roco-push-console:latest}
    container_name: roco-push-console
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-19892}:19892"
    volumes:
      - ./data:/data
    environment:
      TZ: Asia/Shanghai
      CONFIG_PATH: /data/config.json
      APP_MODE: ${APP_MODE:-web}
      WEB_HOST: 0.0.0.0
      WEB_PORT: 19892
      CONSOLE_USERNAME: ${CONSOLE_USERNAME:-admin}
      CONSOLE_PASSWORD: ${CONSOLE_PASSWORD:-}
      ROCOM_API_KEY: ${ROCOM_API_KEY:-}
      ROCOM_API_URL: ${ROCOM_API_URL:-}
      SERVERCHAN_SENDKEY: ${SERVERCHAN_SENDKEY:-}
      PUSHPLUS_TOKEN: ${PUSHPLUS_TOKEN:-}
      PUSHPLUS_TOPIC: ${PUSHPLUS_TOPIC:-}
      PUSHPLUS_CHANNEL: ${PUSHPLUS_CHANNEL:-}
      WECOM_CORPID: ${WECOM_CORPID:-}
      WECOM_SECRET: ${WECOM_SECRET:-}
      WECOM_AGENTID: ${WECOM_AGENTID:-}
      WECOM_TOUSER: ${WECOM_TOUSER:-}
      WECOM_BOT_WEBHOOK: ${WECOM_BOT_WEBHOOK:-}
      WECOM_BOT_KEY: ${WECOM_BOT_KEY:-}
      WXPUSHER_APP_TOKEN: ${WXPUSHER_APP_TOKEN:-}
      WXPUSHER_UIDS: ${WXPUSHER_UIDS:-}
      WXPUSHER_TOPIC_IDS: ${WXPUSHER_TOPIC_IDS:-}
      BARK_SERVER_URL: ${BARK_SERVER_URL:-}
      BARK_DEVICE_KEY: ${BARK_DEVICE_KEY:-}
      BARK_GROUP: ${BARK_GROUP:-}
      DINGTALK_WEBHOOK: ${DINGTALK_WEBHOOK:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      FEISHU_WEBHOOK: ${FEISHU_WEBHOOK:-}
      FEISHU_SECRET: ${FEISHU_SECRET:-}
      NTFY_BASE_URL: ${NTFY_BASE_URL:-}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      NTFY_PRIORITY: ${NTFY_PRIORITY:-}
      NTFY_TAGS: ${NTFY_TAGS:-}
      GOTIFY_BASE_URL: ${GOTIFY_BASE_URL:-}
      GOTIFY_APP_TOKEN: ${GOTIFY_APP_TOKEN:-}
      GOTIFY_PRIORITY: ${GOTIFY_PRIORITY:-}
      NOTIFY_EMPTY: ${NOTIFY_EMPTY:-false}
      DELIVERY_MODE: ${DELIVERY_MODE:-all}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-30}
      SCHEDULE_TIMES: ${SCHEDULE_TIMES:-08:05,12:05,16:05,20:05}
      RUN_ON_START: ${RUN_ON_START:-false}
