name: Worker Release Artifact

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  upload-worker:
    name: Upload _worker.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json

      - name: Test CF Worker
        uses: ./.github/actions/test-cf-worker

      - name: Upload _worker.js to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" cloudflare-worker/_worker.js --clobber
