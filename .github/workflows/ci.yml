name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests

      - name: Compile Python files
        run: uv run python -m compileall -q src main.py tests

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cf-workers/package-lock.json

      - name: Install CF Worker dependencies
        working-directory: cf-workers
        run: npm ci

      - name: Run CF Worker tests
        working-directory: cf-workers
        run: npm test

      - name: Type-check CF Worker
        working-directory: cf-workers
        run: npx tsc --noEmit

      - name: Validate pasteable Worker bundle
        working-directory: cf-workers
        run: npm run check:worker
